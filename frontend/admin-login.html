<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập quản trị — Meeting Room Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./login-page.css?v=6" />
  </head>
  <body class="account-page page-shell account-page--admin">
    <div class="account-bg" aria-hidden="true"></div>

    <div class="account-wrap">
      <div class="account-back-row">
        <a href="./index.html" class="account-back-link">← Trở về trang chính</a>
        <span class="account-admin-hint">Khách hàng? <a href="./login.html?tab=login" class="account-admin-link">Đăng nhập thường</a></span>
      </div>

      <div class="account-card">
        <div class="account-card-header">
          <p class="account-brand">Meeting Room Pro</p>
          <h1>MRP Admin</h1>
          <p class="account-card-subtitle">Đăng nhập tài khoản quản trị hệ thống.</p>
        </div>

        <div class="account-card-body">
          <div id="tab-admin-login" class="account-panel">
            <label class="account-field">
              <span class="account-field-icon" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="m22 6-10 7L2 6"/></svg>
              </span>
              <input id="adminEmail" type="email" autocomplete="username" placeholder="Email quản trị" class="account-input" />
            </label>

            <label class="account-field">
              <span class="account-field-icon" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </span>
              <input id="adminPassword" type="password" autocomplete="current-password" placeholder="Mật khẩu" class="account-input" />
            </label>

            <button id="btnAdminLogin" type="button" class="account-btn">
              Đăng nhập quản trị
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="./shared.js"></script>
    <script src="./admin-login.js"></script>
  </body>
</html>
